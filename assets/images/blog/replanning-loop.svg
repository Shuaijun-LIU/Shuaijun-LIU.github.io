<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Replanning loop in embodied AI</title>
  <desc id="desc">A comparison between open-loop execution and feedback-driven replanning for embodied agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f7f2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#15324a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f80ed"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f2994a"/>
    </marker>
    <style>
      .title { font: 700 32px Lato, Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 400 17px Lato, Arial, sans-serif; fill: #607080; }
      .panel-title { font: 700 22px Lato, Arial, sans-serif; fill: #253447; }
      .label { font: 700 17px Lato, Arial, sans-serif; fill: #26323f; }
      .small { font: 400 14px Lato, Arial, sans-serif; fill: #617083; }
      .tiny { font: 600 12px Lato, Arial, sans-serif; fill: #6b7887; text-transform: uppercase; }
      .box { fill: #fff; stroke: #e2e8f0; stroke-width: 1.5; rx: 16; filter: url(#shadow); }
      .soft-blue { fill: #edf5ff; stroke: #b7d7ff; }
      .soft-green { fill: #eef9f2; stroke: #bfe8cc; }
      .soft-orange { fill: #fff5eb; stroke: #ffd7aa; }
      .soft-purple { fill: #f6f0ff; stroke: #dcc7ff; }
      .line-blue { stroke: #2f80ed; stroke-width: 3.5; fill: none; marker-end: url(#arrow-blue); }
      .line-orange { stroke: #f2994a; stroke-width: 3.5; fill: none; marker-end: url(#arrow-orange); }
      .dash { stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="60" y="62" class="title">What Replanning Adds to Embodied AI</text>
  <text x="60" y="94" class="subtitle">A robot cannot simply write a plan once. It must use observations to decide whether to continue, repair, or replan.</text>

  <rect x="58" y="132" width="480" height="410" rx="24" fill="#ffffff" stroke="#e5edf5"/>
  <text x="90" y="178" class="panel-title">Open-loop plan</text>
  <text x="90" y="205" class="small">Useful as a first draft, brittle during execution.</text>

  <rect x="108" y="250" width="165" height="82" class="box soft-blue"/>
  <text x="132" y="283" class="label">Plan once</text>
  <text x="132" y="307" class="small">Subgoals and skills</text>

  <path d="M 286 291 L 346 291" class="line-blue"/>
  <rect x="360" y="250" width="135" height="82" class="box soft-orange"/>
  <text x="388" y="283" class="label">Execute</text>
  <text x="386" y="307" class="small">Fixed sequence</text>

  <path d="M 428 342 C 426 392 372 418 292 402 C 226 389 176 407 153 447" class="line-orange dash"/>
  <text x="144" y="476" class="small">Object moved, grasp failed,</text>
  <text x="144" y="498" class="small">or a safer action is needed.</text>

  <rect x="600" y="132" width="542" height="410" rx="24" fill="#ffffff" stroke="#e5edf5"/>
  <text x="635" y="178" class="panel-title">Replanning loop</text>
  <text x="635" y="205" class="small">Closed-loop reasoning grounded in state, progress, and cost.</text>

  <rect x="660" y="248" width="150" height="78" class="box soft-blue"/>
  <text x="692" y="279" class="label">Plan</text>
  <text x="688" y="303" class="small">Goal to subgoals</text>

  <path d="M 821 287 L 884 287" class="line-blue"/>
  <rect x="898" y="248" width="150" height="78" class="box soft-green"/>
  <text x="931" y="279" class="label">Act</text>
  <text x="925" y="303" class="small">Skill execution</text>

  <path d="M 973 336 C 973 384 932 418 872 418" class="line-blue"/>
  <rect x="752" y="382" width="190" height="82" class="box soft-purple"/>
  <text x="781" y="414" class="label">Observe</text>
  <text x="781" y="438" class="small">State, success, risk</text>

  <path d="M 742 423 C 684 418 645 379 654 327" class="line-blue"/>
  <rect x="660" y="486" width="388" height="38" rx="19" fill="#f8fafc" stroke="#dde6f0"/>
  <text x="690" y="511" class="tiny">Decision policy: continue, repair, or replan under a compute budget</text>

  <path d="M 853 467 L 853 483" class="line-orange"/>
  <path d="M 853 486 C 835 462 800 454 760 462" stroke="#f2994a" stroke-width="3" fill="none"/>

  <circle cx="1065" cy="262" r="11" fill="#2f80ed"/>
  <circle cx="1095" cy="262" r="11" fill="#27ae60"/>
  <circle cx="1125" cy="262" r="11" fill="#f2994a"/>
  <text x="1060" y="301" class="small" text-anchor="middle">Perception</text>
  <text x="1095" y="322" class="small" text-anchor="middle">Memory</text>
  <text x="1124" y="343" class="small" text-anchor="middle">Affordance</text>
</svg>
