<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Execution modes in the multi-agent GPU demo</title>
  <desc id="desc">Six execution modes: multi-GPU parallel, auto-expanded parallel, sequential single-GPU, shared model single-GPU, cooperative chain, and hierarchical leader-worker.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .title { font-size: 28px; font-weight: 700; fill: #111827; }
      .sub { font-size: 14px; fill: #667085; }
      .card-title { font-size: 16px; font-weight: 700; fill: #1d2939; }
      .body { font-size: 12.5px; fill: #475467; }
      .small { font-size: 11px; fill: #667085; }
      .gpu { fill: #e8f1ff; stroke: #2f80ed; stroke-width: 1.4; }
      .agent { fill: #fff7ed; stroke: #f4a261; stroke-width: 1.3; }
      .model { fill: #ecfdf3; stroke: #12b76a; stroke-width: 1.3; }
      .line { stroke: #98a2b3; stroke-width: 1.5; fill: none; }
      .arrow { marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#98a2b3"/>
    </marker>
  </defs>

  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="64" y="48" class="title">Six Ways to Run Eight Local LLM Agents</text>
  <text x="64" y="75" class="sub">The demo keeps the agents simple, then varies deployment, model sharing, and orchestration.</text>

  <g transform="translate(64,112)">
    <rect x="0" y="0" width="330" height="135" rx="16" fill="#fbfdff" stroke="#d7e7ff"/>
    <text x="20" y="30" class="card-title">1. Parallel Multi-GPU</text>
    <text x="20" y="54" class="body">8 processes, 8 model copies, 8 GPUs.</text>
    <text x="20" y="73" class="body">Fastest strict baseline in this demo.</text>
    <g transform="translate(20,92)">
      <rect class="gpu" x="0" y="0" width="28" height="24" rx="5"/><text class="small" x="14" y="16" text-anchor="middle">0</text>
      <rect class="gpu" x="38" y="0" width="28" height="24" rx="5"/><text class="small" x="52" y="16" text-anchor="middle">1</text>
      <rect class="gpu" x="76" y="0" width="28" height="24" rx="5"/><text class="small" x="90" y="16" text-anchor="middle">2</text>
      <rect class="gpu" x="114" y="0" width="28" height="24" rx="5"/><text class="small" x="128" y="16" text-anchor="middle">3</text>
      <rect class="gpu" x="152" y="0" width="28" height="24" rx="5"/><text class="small" x="166" y="16" text-anchor="middle">4</text>
      <rect class="gpu" x="190" y="0" width="28" height="24" rx="5"/><text class="small" x="204" y="16" text-anchor="middle">5</text>
      <rect class="gpu" x="228" y="0" width="28" height="24" rx="5"/><text class="small" x="242" y="16" text-anchor="middle">6</text>
      <rect class="gpu" x="266" y="0" width="28" height="24" rx="5"/><text class="small" x="280" y="16" text-anchor="middle">7</text>
    </g>
  </g>

  <g transform="translate(435,112)">
    <rect x="0" y="0" width="330" height="135" rx="16" fill="#fbfdff" stroke="#d7e7ff"/>
    <text x="20" y="30" class="card-title">2. Auto-Expanded Parallel</text>
    <text x="20" y="54" class="body">Start with one GPU; retry after OOM.</text>
    <text x="20" y="73" class="body">This run succeeded at 3 GPUs.</text>
    <g transform="translate(20,92)">
      <rect class="gpu" x="0" y="0" width="56" height="24" rx="5"/><text class="small" x="28" y="16" text-anchor="middle">1 GPU</text>
      <path class="line arrow" d="M65 12 H102"/>
      <rect class="gpu" x="110" y="0" width="56" height="24" rx="5"/><text class="small" x="138" y="16" text-anchor="middle">2 GPUs</text>
      <path class="line arrow" d="M175 12 H212"/>
      <rect class="gpu" x="220" y="0" width="64" height="24" rx="5"/><text class="small" x="252" y="16" text-anchor="middle">3 GPUs</text>
    </g>
  </g>

  <g transform="translate(806,112)">
    <rect x="0" y="0" width="330" height="135" rx="16" fill="#fbfdff" stroke="#d7e7ff"/>
    <text x="20" y="30" class="card-title">3. Sequential Single-GPU</text>
    <text x="20" y="54" class="body">One agent at a time on GPU 0.</text>
    <text x="20" y="73" class="body">Memory-safe, but no task-level parallelism.</text>
    <g transform="translate(20,91)">
      <rect class="gpu" x="0" y="0" width="48" height="26" rx="6"/><text class="small" x="24" y="17" text-anchor="middle">GPU0</text>
      <path class="line arrow" d="M58 13 H92"/>
      <rect class="agent" x="100" y="0" width="28" height="26" rx="6"/><text class="small" x="114" y="17" text-anchor="middle">A</text>
      <path class="line arrow" d="M134 13 H162"/>
      <rect class="agent" x="170" y="0" width="28" height="26" rx="6"/><text class="small" x="184" y="17" text-anchor="middle">B</text>
      <path class="line arrow" d="M204 13 H232"/>
      <rect class="agent" x="240" y="0" width="28" height="26" rx="6"/><text class="small" x="254" y="17" text-anchor="middle">...</text>
    </g>
  </g>

  <g transform="translate(64,310)">
    <rect x="0" y="0" width="330" height="145" rx="16" fill="#fbfdff" stroke="#dff5e8"/>
    <text x="20" y="30" class="card-title">4. Shared Model Single-GPU</text>
    <text x="20" y="54" class="body">Load one model, attach it to all agents.</text>
    <text x="20" y="73" class="body">Saves memory, but calls contend for one pipeline.</text>
    <g transform="translate(20,96)">
      <rect class="model" x="0" y="0" width="76" height="28" rx="7"/><text class="small" x="38" y="18" text-anchor="middle">1 model</text>
      <path class="line" d="M88 14 H116"/>
      <rect class="agent" x="125" y="-10" width="28" height="22" rx="6"/><text class="small" x="139" y="5" text-anchor="middle">A</text>
      <rect class="agent" x="160" y="-10" width="28" height="22" rx="6"/><text class="small" x="174" y="5" text-anchor="middle">B</text>
      <rect class="agent" x="195" y="-10" width="28" height="22" rx="6"/><text class="small" x="209" y="5" text-anchor="middle">C</text>
      <rect class="agent" x="230" y="-10" width="28" height="22" rx="6"/><text class="small" x="244" y="5" text-anchor="middle">...</text>
      <rect class="gpu" x="125" y="22" width="133" height="24" rx="6"/><text class="small" x="191" y="38" text-anchor="middle">GPU0</text>
    </g>
  </g>

  <g transform="translate(435,310)">
    <rect x="0" y="0" width="330" height="145" rx="16" fill="#fbfdff" stroke="#f7dec1"/>
    <text x="20" y="30" class="card-title">5. Cooperative Chain</text>
    <text x="20" y="54" class="body">Agents run in sequence and pass context.</text>
    <text x="20" y="73" class="body">Useful for role-specialized handoffs.</text>
    <g transform="translate(20,101)">
      <rect class="agent" x="0" y="0" width="38" height="25" rx="6"/><text class="small" x="19" y="17" text-anchor="middle">PM</text>
      <path class="line arrow" d="M48 13 H78"/>
      <rect class="agent" x="86" y="0" width="38" height="25" rx="6"/><text class="small" x="105" y="17" text-anchor="middle">Arch</text>
      <path class="line arrow" d="M134 13 H164"/>
      <rect class="agent" x="172" y="0" width="38" height="25" rx="6"/><text class="small" x="191" y="17" text-anchor="middle">AI</text>
      <path class="line arrow" d="M220 13 H250"/>
      <rect class="agent" x="258" y="0" width="38" height="25" rx="6"/><text class="small" x="277" y="17" text-anchor="middle">...</text>
    </g>
  </g>

  <g transform="translate(806,310)">
    <rect x="0" y="0" width="330" height="145" rx="16" fill="#fbfdff" stroke="#f7dec1"/>
    <text x="20" y="30" class="card-title">6. Hierarchical Leader-Worker</text>
    <text x="20" y="54" class="body">Leader plans, workers execute, leader summarizes.</text>
    <text x="20" y="73" class="body">Combines coordination with parallel execution.</text>
    <g transform="translate(20,92)">
      <rect class="agent" x="112" y="0" width="74" height="26" rx="7"/><text class="small" x="149" y="17" text-anchor="middle">Leader</text>
      <path class="line arrow" d="M149 31 V53"/>
      <rect class="gpu" x="5" y="58" width="42" height="24" rx="6"/><text class="small" x="26" y="74" text-anchor="middle">W1</text>
      <rect class="gpu" x="58" y="58" width="42" height="24" rx="6"/><text class="small" x="79" y="74" text-anchor="middle">W2</text>
      <rect class="gpu" x="111" y="58" width="42" height="24" rx="6"/><text class="small" x="132" y="74" text-anchor="middle">W3</text>
      <rect class="gpu" x="164" y="58" width="42" height="24" rx="6"/><text class="small" x="185" y="74" text-anchor="middle">W4</text>
      <rect class="gpu" x="217" y="58" width="42" height="24" rx="6"/><text class="small" x="238" y="74" text-anchor="middle">...</text>
      <path class="line" d="M149 53 C98 48, 72 52, 26 58"/>
      <path class="line" d="M149 53 C126 50, 105 52, 79 58"/>
      <path class="line" d="M149 53 V58"/>
      <path class="line" d="M149 53 C170 50, 183 52, 185 58"/>
      <path class="line" d="M149 53 C204 48, 225 52, 238 58"/>
    </g>
  </g>

  <text x="64" y="545" class="sub">Main idea: orchestration and GPU placement are part of the agent system design, not just implementation details.</text>
  <text x="64" y="570" class="small">A = agent, GPU = model placement target, model = shared local LLM instance.</text>
</svg>
