<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Retrieval augmented generation pipeline</title>
  <desc id="desc">Documents are indexed into vectors, then a query retrieves context before generation.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="980" height="430" rx="28" fill="#f8fafc"/>
  <text x="54" y="54" fill="#0f172a" font-family="Lato, Arial, sans-serif" font-size="26" font-weight="700">RAG connects a model to external memory</text>
  <text x="54" y="88" fill="#64748b" font-family="Lato, Arial, sans-serif" font-size="16">Index documents once. At query time, retrieve relevant chunks and ground the generated answer.</text>
  <g font-family="Lato, Arial, sans-serif" filter="url(#shadow)">
    <rect x="68" y="144" width="140" height="96" rx="16" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <text x="138" y="184" text-anchor="middle" fill="#1e3a8a" font-size="18" font-weight="700">Documents</text>
    <text x="138" y="214" text-anchor="middle" fill="#2563eb" font-size="14">PDFs, notes, web</text>
    <rect x="270" y="144" width="140" height="96" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="340" y="184" text-anchor="middle" fill="#92400e" font-size="18" font-weight="700">Chunks</text>
    <text x="340" y="214" text-anchor="middle" fill="#b45309" font-size="14">small passages</text>
    <rect x="472" y="144" width="140" height="96" rx="16" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="542" y="184" text-anchor="middle" fill="#5b21b6" font-size="18" font-weight="700">Embeddings</text>
    <text x="542" y="214" text-anchor="middle" fill="#6d28d9" font-size="14">dense vectors</text>
    <rect x="674" y="144" width="170" height="96" rx="16" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="759" y="184" text-anchor="middle" fill="#166534" font-size="18" font-weight="700">Vector Index</text>
    <text x="759" y="214" text-anchor="middle" fill="#15803d" font-size="14">searchable memory</text>
  </g>
  <path d="M218 192 H254" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M420 192 H456" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M622 192 H658" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <g filter="url(#shadow)" font-family="Lato, Arial, sans-serif">
    <rect x="120" y="302" width="170" height="70" rx="15" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
    <text x="205" y="331" text-anchor="middle" fill="#991b1b" font-size="17" font-weight="700">User Query</text>
    <text x="205" y="354" text-anchor="middle" fill="#b91c1c" font-size="13">What should I know?</text>
    <rect x="398" y="302" width="190" height="70" rx="15" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
    <text x="493" y="331" text-anchor="middle" fill="#075985" font-size="17" font-weight="700">Retrieved Context</text>
    <text x="493" y="354" text-anchor="middle" fill="#0369a1" font-size="13">top passages + metadata</text>
    <rect x="704" y="302" width="170" height="70" rx="15" fill="#ecfccb" stroke="#84cc16" stroke-width="2"/>
    <text x="789" y="331" text-anchor="middle" fill="#3f6212" font-size="17" font-weight="700">Grounded Answer</text>
    <text x="789" y="354" text-anchor="middle" fill="#4d7c0f" font-size="13">response + citations</text>
  </g>
  <path d="M300 337 H382" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M598 337 H688" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M493 292 C520 258, 596 245, 688 230" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <text x="586" y="272" fill="#475569" font-family="Lato, Arial, sans-serif" font-size="14">retrieve from index</text>
</svg>
