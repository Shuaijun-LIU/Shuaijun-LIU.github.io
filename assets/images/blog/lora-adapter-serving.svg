<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">LoRA adapter serving pattern</title>
  <desc id="desc">One shared base model can connect to several compact task adapters.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <linearGradient id="model" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="980" height="430" rx="28" fill="#fbfdff"/>
  <text x="54" y="58" fill="#0f172a" font-family="Lato, Arial, sans-serif" font-size="26" font-weight="700">One base model, many small adapters</text>
  <text x="54" y="92" fill="#64748b" font-family="Lato, Arial, sans-serif" font-size="16">LoRA makes task specialization modular instead of copying the full checkpoint every time.</text>
  <g filter="url(#shadow)">
    <rect x="80" y="150" width="250" height="160" rx="22" fill="url(#model)" stroke="#60a5fa" stroke-width="2"/>
    <text x="205" y="214" text-anchor="middle" fill="#1e3a8a" font-family="Lato, Arial, sans-serif" font-size="24" font-weight="700">Shared Base Model</text>
    <text x="205" y="248" text-anchor="middle" fill="#2563eb" font-family="Lato, Arial, sans-serif" font-size="15">frozen checkpoint</text>
    <text x="205" y="276" text-anchor="middle" fill="#2563eb" font-family="Source Code Pro, monospace" font-size="14">large, loaded once</text>
  </g>
  <g font-family="Lato, Arial, sans-serif" filter="url(#shadow)">
    <rect x="540" y="118" width="285" height="62" rx="17" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="682" y="156" text-anchor="middle" fill="#92400e" font-size="18" font-weight="700">Summarization Adapter</text>
    <rect x="540" y="210" width="285" height="62" rx="17" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="682" y="248" text-anchor="middle" fill="#5b21b6" font-size="18" font-weight="700">Domain QA Adapter</text>
    <rect x="540" y="302" width="285" height="62" rx="17" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="682" y="340" text-anchor="middle" fill="#166534" font-size="18" font-weight="700">Extraction Adapter</text>
  </g>
  <path d="M344 230 C420 140, 462 149, 520 149" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M344 230 H520" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M344 230 C420 322, 462 333, 520 333" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <text x="432" y="211" text-anchor="middle" fill="#475569" font-family="Lato, Arial, sans-serif" font-size="15">load, merge, or swap</text>
  <g>
    <rect x="110" y="344" width="780" height="44" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="500" y="372" text-anchor="middle" fill="#475569" font-family="Lato, Arial, sans-serif" font-size="15">Adapters are small enough to version and distribute separately from the base model.</text>
  </g>
</svg>
