<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">RAG evaluation loop</title>
  <desc id="desc">Evaluation checks retrieval, faithfulness, answer quality, and system cost.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="980" height="430" rx="28" fill="#fbfdff"/>
  <text x="54" y="58" fill="#0f172a" font-family="Lato, Arial, sans-serif" font-size="26" font-weight="700">RAG quality is a pipeline property</text>
  <text x="54" y="92" fill="#64748b" font-family="Lato, Arial, sans-serif" font-size="16">A fluent answer can still fail if retrieval missed evidence or generation ignored it.</text>
  <g filter="url(#shadow)" font-family="Lato, Arial, sans-serif">
    <circle cx="490" cy="230" r="86" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="490" y="222" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700">Improve</text>
    <text x="490" y="249" text-anchor="middle" fill="#475569" font-size="14">chunking, retrieval, prompts</text>
    <rect x="98" y="146" width="210" height="74" rx="16" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <text x="203" y="177" text-anchor="middle" fill="#1e3a8a" font-size="18" font-weight="700">Retrieval Recall</text>
    <text x="203" y="200" text-anchor="middle" fill="#2563eb" font-size="13">Did we find the evidence?</text>
    <rect x="672" y="146" width="210" height="74" rx="16" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="777" y="177" text-anchor="middle" fill="#166534" font-size="18" font-weight="700">Faithfulness</text>
    <text x="777" y="200" text-anchor="middle" fill="#15803d" font-size="13">Did the answer use it?</text>
    <rect x="98" y="288" width="210" height="74" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="203" y="319" text-anchor="middle" fill="#92400e" font-size="18" font-weight="700">Answer Quality</text>
    <text x="203" y="342" text-anchor="middle" fill="#b45309" font-size="13">Is it useful and concise?</text>
    <rect x="672" y="288" width="210" height="74" rx="16" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="777" y="319" text-anchor="middle" fill="#5b21b6" font-size="18" font-weight="700">Latency and Cost</text>
    <text x="777" y="342" text-anchor="middle" fill="#6d28d9" font-size="13">Can it run in production?</text>
  </g>
  <path d="M318 184 C380 154, 417 150, 456 166" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M526 166 C584 143, 624 154, 660 184" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M668 314 C608 349, 569 350, 524 318" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M454 318 C396 349, 354 349, 316 326" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <text x="490" y="392" text-anchor="middle" fill="#64748b" font-family="Lato, Arial, sans-serif" font-size="15">Evaluate components separately, then test the end-to-end user experience.</text>
</svg>
