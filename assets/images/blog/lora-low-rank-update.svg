<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">LoRA low-rank update</title>
  <desc id="desc">A frozen pretrained matrix is combined with two small trainable low-rank matrices.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#d97706"/>
    </marker>
    <linearGradient id="baseGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="loraGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fed7aa"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="980" height="430" rx="28" fill="#f8fafc"/>
  <g transform="translate(54 54)">
    <text x="0" y="0" fill="#0f172a" font-family="Lato, Arial, sans-serif" font-size="26" font-weight="700">LoRA trains a small residual branch</text>
    <text x="0" y="34" fill="#64748b" font-family="Lato, Arial, sans-serif" font-size="16">The pretrained layer stays frozen. Only the two low-rank matrices are updated.</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="90" y="145" width="170" height="170" rx="18" fill="url(#baseGrad)" stroke="#60a5fa" stroke-width="2"/>
    <text x="175" y="210" text-anchor="middle" fill="#1e3a8a" font-family="Lato, Arial, sans-serif" font-size="24" font-weight="700">W</text>
    <text x="175" y="240" text-anchor="middle" fill="#1d4ed8" font-family="Lato, Arial, sans-serif" font-size="15">frozen</text>
    <text x="175" y="268" text-anchor="middle" fill="#1d4ed8" font-family="Source Code Pro, monospace" font-size="14">d x k</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="390" y="160" width="96" height="140" rx="16" fill="url(#loraGrad)" stroke="#f59e0b" stroke-width="2"/>
    <text x="438" y="224" text-anchor="middle" fill="#92400e" font-family="Lato, Arial, sans-serif" font-size="24" font-weight="700">A</text>
    <text x="438" y="253" text-anchor="middle" fill="#b45309" font-family="Source Code Pro, monospace" font-size="14">r x d</text>
    <rect x="526" y="128" width="126" height="204" rx="16" fill="url(#loraGrad)" stroke="#f59e0b" stroke-width="2"/>
    <text x="589" y="224" text-anchor="middle" fill="#92400e" font-family="Lato, Arial, sans-serif" font-size="24" font-weight="700">B</text>
    <text x="589" y="253" text-anchor="middle" fill="#b45309" font-family="Source Code Pro, monospace" font-size="14">k x r</text>
  </g>
  <path d="M286 230 H354" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)" fill="none"/>
  <path d="M488 230 H514" stroke="#d97706" stroke-width="4" marker-end="url(#arrow-amber)" fill="none"/>
  <path d="M670 230 H744" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)" fill="none"/>
  <g filter="url(#softShadow)">
    <rect x="770" y="150" width="150" height="160" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="845" y="210" text-anchor="middle" fill="#166534" font-family="Lato, Arial, sans-serif" font-size="20" font-weight="700">W + BA</text>
    <text x="845" y="240" text-anchor="middle" fill="#15803d" font-family="Lato, Arial, sans-serif" font-size="15">adapted layer</text>
    <text x="845" y="268" text-anchor="middle" fill="#15803d" font-family="Source Code Pro, monospace" font-size="14">merged or separate</text>
  </g>
  <text x="438" y="338" text-anchor="middle" fill="#92400e" font-family="Lato, Arial, sans-serif" font-size="15">trainable low-rank path</text>
  <text x="175" y="338" text-anchor="middle" fill="#1d4ed8" font-family="Lato, Arial, sans-serif" font-size="15">general pretrained capability</text>
  <text x="510" y="392" text-anchor="middle" fill="#475569" font-family="Lato, Arial, sans-serif" font-size="16">If r is small, r(d + k) trainable parameters replace d x k full updates.</text>
</svg>
