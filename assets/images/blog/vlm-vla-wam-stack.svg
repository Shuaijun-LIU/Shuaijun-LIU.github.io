<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Conceptual stack from VLM to VLA to WAM</title>
  <desc id="desc">A diagram comparing vision-language models, vision-language-action models, and world action models by input, modeling target, and output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.52" stop-color="#fffaf1"/>
      <stop offset="1" stop-color="#f6fbf7"/>
    </linearGradient>
    <linearGradient id="vlm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b73d9"/>
      <stop offset="1" stop-color="#71a6ff"/>
    </linearGradient>
    <linearGradient id="vla" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#238a5b"/>
      <stop offset="1" stop-color="#63c98e"/>
    </linearGradient>
    <linearGradient id="wam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d98421"/>
      <stop offset="1" stop-color="#f2b85d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546171"/>
    </marker>
    <style>
      .title { font: 700 36px Lato, Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 18px Lato, Arial, sans-serif; fill: #5f6b7a; }
      .label { font: 800 27px Lato, Arial, sans-serif; fill: #fff; }
      .label-small { font: 700 13px Lato, Arial, sans-serif; fill: #eaf2ff; letter-spacing: .08em; }
      .card-title { font: 700 20px Lato, Arial, sans-serif; fill: #172033; }
      .card-text { font: 400 15px Lato, Arial, sans-serif; fill: #5b6572; }
      .formula { font: 700 17px "Source Code Pro", Menlo, monospace; fill: #2a3442; }
      .pill-text { font: 700 13px Lato, Arial, sans-serif; fill: #344154; }
      .arrow { stroke: #546171; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <circle cx="1050" cy="110" r="82" fill="#e7f0ff"/>
  <circle cx="158" cy="580" r="92" fill="#fff0d4"/>
  <circle cx="1028" cy="548" r="72" fill="#e7f8ed"/>

  <text x="70" y="72" class="title">From Understanding to Physical Consequence</text>
  <text x="72" y="108" class="subtitle">The model's target changes as we move from describing images to acting in the world.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="180" width="300" height="392" rx="20" fill="#ffffff" stroke="#d9e7ff"/>
    <rect x="72" y="180" width="300" height="88" rx="20" fill="url(#vlm)"/>
    <text x="102" y="218" class="label-small">VISION-LANGUAGE MODEL</text>
    <text x="102" y="252" class="label">VLM</text>
    <text x="102" y="318" class="card-title">Understanding Layer</text>
    <text x="102" y="352" class="card-text">Input: image + text</text>
    <text x="102" y="378" class="card-text">Output: answer, caption, label,</text>
    <text x="102" y="402" class="card-text">or high-level plan</text>
    <rect x="102" y="436" width="232" height="44" rx="22" fill="#eef5ff" stroke="#d8e8ff"/>
    <text x="124" y="464" class="formula">p(text | image, prompt)</text>
    <text x="102" y="522" class="card-text">Strong semantic priors, but no</text>
    <text x="102" y="546" class="card-text">direct control responsibility.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="180" width="300" height="392" rx="20" fill="#ffffff" stroke="#d8f2df"/>
    <rect x="450" y="180" width="300" height="88" rx="20" fill="url(#vla)"/>
    <text x="480" y="218" class="label-small">VISION-LANGUAGE-ACTION MODEL</text>
    <text x="480" y="252" class="label">VLA</text>
    <text x="480" y="318" class="card-title">Action Layer</text>
    <text x="480" y="352" class="card-text">Input: observation + instruction</text>
    <text x="480" y="378" class="card-text">+ robot state</text>
    <text x="480" y="402" class="card-text">Output: action token or chunk</text>
    <rect x="480" y="436" width="222" height="44" rx="22" fill="#ecfbf1" stroke="#d4f0dc"/>
    <text x="518" y="464" class="formula">p(action | obs, goal)</text>
    <text x="480" y="522" class="card-text">The model must be fast enough</text>
    <text x="480" y="546" class="card-text">for closed-loop execution.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="828" y="180" width="300" height="392" rx="20" fill="#ffffff" stroke="#ffe5bb"/>
    <rect x="828" y="180" width="300" height="88" rx="20" fill="url(#wam)"/>
    <text x="858" y="218" class="label-small">WORLD ACTION MODEL</text>
    <text x="858" y="252" class="label">WAM</text>
    <text x="858" y="318" class="card-title">Consequence Layer</text>
    <text x="858" y="352" class="card-text">Input: observation + instruction</text>
    <text x="858" y="378" class="card-text">+ candidate behavior</text>
    <text x="858" y="402" class="card-text">Output: action + predicted future</text>
    <rect x="858" y="436" width="232" height="44" rx="22" fill="#fff5e6" stroke="#ffe1b2"/>
    <text x="877" y="464" class="formula">p(action, future | obs, goal)</text>
    <text x="858" y="522" class="card-text">Useful when consequences and</text>
    <text x="858" y="546" class="card-text">replanning decisions dominate.</text>
  </g>

  <path d="M372 374 H450" class="arrow"/>
  <path d="M750 374 H828" class="arrow"/>

  <g>
    <rect x="396" y="604" width="408" height="44" rx="22" fill="#ffffff" stroke="#d9dee8"/>
    <text x="435" y="632" class="pill-text">The main shift: from naming the world to changing it.</text>
  </g>
</svg>
