<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Conceptual pipeline of a vision-language-action model</title>
  <desc id="desc">A diagram showing how images, language, and robot state are encoded, fused, converted into action chunks, and executed with feedback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.48" stop-color="#fffaf2"/>
      <stop offset="1" stop-color="#f7fbf7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1d2733" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5d6978"/>
    </marker>
    <style>
      .title { font: 700 34px Lato, Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 18px Lato, Arial, sans-serif; fill: #5c6674; }
      .box-title { font: 700 18px Lato, Arial, sans-serif; fill: #172033; }
      .box-text { font: 400 14px Lato, Arial, sans-serif; fill: #56606f; }
      .tiny { font: 700 12px Lato, Arial, sans-serif; fill: #ffffff; letter-spacing: .08em; }
      .callout { font: 600 16px Lato, Arial, sans-serif; fill: #283342; }
      .arrow { stroke: #5d6978; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .feedback { stroke: #6f63d2; stroke-width: 3; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="100" r="80" fill="#e8f1ff"/>
  <circle cx="160" cy="520" r="95" fill="#fff1dc"/>
  <circle cx="1030" cy="530" r="70" fill="#eaf7ec"/>

  <text x="68" y="70" class="title">From Instruction to Action</text>
  <text x="70" y="104" class="subtitle">A VLA model turns perception and language into closed-loop robot behavior.</text>

  <g filter="url(#softShadow)">
    <rect x="68" y="176" width="190" height="128" rx="18" fill="#ffffff" stroke="#d8e5ff"/>
    <rect x="68" y="176" width="190" height="34" rx="18" fill="#3d72d8"/>
    <text x="91" y="198" class="tiny">INPUT</text>
    <text x="92" y="238" class="box-title">Observation</text>
    <text x="92" y="265" class="box-text">RGB image or video</text>
    <text x="92" y="287" class="box-text">Robot proprioception</text>

    <rect x="68" y="350" width="190" height="128" rx="18" fill="#ffffff" stroke="#ffe0ad"/>
    <rect x="68" y="350" width="190" height="34" rx="18" fill="#df8b20"/>
    <text x="91" y="372" class="tiny">GOAL</text>
    <text x="92" y="412" class="box-title">Instruction</text>
    <text x="92" y="439" class="box-text">"Put the cup</text>
    <text x="92" y="461" class="box-text">on the shelf"</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="342" y="214" width="190" height="228" rx="18" fill="#ffffff" stroke="#dbe7ef"/>
    <rect x="342" y="214" width="190" height="34" rx="18" fill="#617083"/>
    <text x="365" y="236" class="tiny">ENCODERS</text>
    <text x="366" y="282" class="box-title">Tokenization</text>
    <text x="366" y="311" class="box-text">Vision tokens</text>
    <text x="366" y="334" class="box-text">Language tokens</text>
    <text x="366" y="357" class="box-text">State tokens</text>
    <line x1="368" y1="382" x2="506" y2="382" stroke="#e2e8f0" stroke-width="2"/>
    <text x="366" y="412" class="box-text">Build a shared context</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="613" y="214" width="206" height="228" rx="18" fill="#ffffff" stroke="#d8f1dc"/>
    <rect x="613" y="214" width="206" height="34" rx="18" fill="#34855a"/>
    <text x="636" y="236" class="tiny">POLICY</text>
    <text x="637" y="282" class="box-title">Multimodal Fusion</text>
    <text x="637" y="311" class="box-text">Ground objects and intent</text>
    <text x="637" y="334" class="box-text">Estimate affordances</text>
    <text x="637" y="357" class="box-text">Choose a useful skill</text>
    <line x1="639" y1="382" x2="793" y2="382" stroke="#e2e8f0" stroke-width="2"/>
    <text x="637" y="412" class="box-text">Reason over task context</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="900" y="176" width="220" height="128" rx="18" fill="#ffffff" stroke="#efdcff"/>
    <rect x="900" y="176" width="220" height="34" rx="18" fill="#7b5dcc"/>
    <text x="923" y="198" class="tiny">ACTIONS</text>
    <text x="924" y="238" class="box-title">Action Head</text>
    <text x="924" y="265" class="box-text">Discrete action tokens</text>
    <text x="924" y="287" class="box-text">or continuous chunks</text>

    <rect x="900" y="350" width="220" height="128" rx="18" fill="#ffffff" stroke="#ffd9d3"/>
    <rect x="900" y="350" width="220" height="34" rx="18" fill="#d15f49"/>
    <text x="923" y="372" class="tiny">ROBOT</text>
    <text x="924" y="412" class="box-title">Execution</text>
    <text x="924" y="439" class="box-text">Controller, gripper, base</text>
    <text x="924" y="461" class="box-text">and sensor feedback</text>
  </g>

  <path class="arrow" d="M258 240 C292 240, 302 275, 342 286"/>
  <path class="arrow" d="M258 414 C292 414, 302 379, 342 370"/>
  <path class="arrow" d="M532 328 H613"/>
  <path class="arrow" d="M819 290 C858 284, 863 246, 900 240"/>
  <path class="arrow" d="M1010 304 V350"/>
  <path class="feedback" d="M930 478 C700 570, 380 555, 160 478"/>

  <g>
    <rect x="431" y="515" width="338" height="48" rx="24" fill="#ffffff" stroke="#d8dee9"/>
    <text x="474" y="546" class="callout">Replan when the world changes</text>
  </g>
</svg>
