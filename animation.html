---
layout: default
title: 3D Demo
navbar_title: 3D Demo
permalink: /animation/
container_class: container-xl
---

<main class="demo-index-page">
    <div class="demo-grid">
        {% for demo in site.data.animation_demos %}
        <a class="demo-card" href="{{ demo.url | relative_url }}">
            <img src="{{ demo.thumbnail | relative_url }}" alt="{{ demo.title }}">
            <div class="demo-card-body">
                <div>
                    <h2>{{ demo.title }}</h2>
                    <p>{{ demo.description }}</p>
                </div>
                <span>{{ demo.type }}</span>
            </div>
        </a>
        {% endfor %}
    </div>
</main>
