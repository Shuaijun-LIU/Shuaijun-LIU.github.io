<main class="animation-page model-demo-page" aria-label="{{ include.label | default: page.title }}">
    <model-viewer
        class="model-demo-viewer"
        src="{{ page.model_src | relative_url }}"
        alt="{{ include.label | default: page.title }}"
        camera-controls
        auto-rotate
        {% if page.model_camera_orbit %}camera-orbit="{{ page.model_camera_orbit }}"{% endif %}
        {% if page.model_camera_target %}camera-target="{{ page.model_camera_target }}"{% endif %}
        {% if page.model_field_of_view %}field-of-view="{{ page.model_field_of_view }}"{% endif %}
        {% if page.model_scale %}scale="{{ page.model_scale }}"{% endif %}
        interaction-prompt="none"
        shadow-intensity="0.75"
        exposure="{{ page.model_exposure | default: 1 }}"
        environment-image="neutral"
        ar>
    </model-viewer>
</main>

<script type="module" src="https://unpkg.com/@google/model-viewer@4.1.0/dist/model-viewer.min.js"></script>
