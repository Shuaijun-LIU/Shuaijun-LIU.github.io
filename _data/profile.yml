short_bio: >-
  <p>
    I am a Ph.D. student at
    <a href="https://www.hkust-gz.edu.cn/" target="_blank">The Hong Kong University of Science and Technology (Guangzhou)</a>,
    advised by Prof. Ningxin Su in <a href="https://nebulis-lab.com" target="_blank">NEBULIS Lab</a>.
  </p>
  <p>
    My research focuses on embodied intelligence, vision-language-action models, robotic manipulation,
    world models, reliable decision-making, and efficient inference for autonomous agents in physical environments.
    I am especially interested in budgeted replanning and robust long-horizon behavior for robot manipulation and
    autonomous maritime robotics.
  </p>

